<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ICT SHOW</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.glass-card{
  width:100%;
  max-width:550px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:25px;
  color:white;
}

.form-control,
.form-range{
  border-radius:10px;
}

.score-box{
  width:50px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="glass-card">

<h3 class="text-center mb-4">
Web Project Score Sheet
</h3>

<form id="form-penilaian">

<label class="form-label">Kelompok</label>

<select id="tim" class="form-control mb-3" required>
<option value="">-- Pilih Tim --</option>
<option>Kelompok 1</option>
<option>Kelompok 2</option>
<option>Kelompok 3</option>
<option>Kelompok 4</option>
<option>Kelompok 5</option>
<option>Kelompok 6</option>
<option>Kelompok 7</option>
<option>Kelompok 8</option>
<option>Kelompok 9</option>
<option>Kelompok 10</option>
<option>Kelompok 11</option>
<option>Kelompok 12</option>
<option>Kelompok 13</option>
<option>Kelompok 14</option>
<option>Kelompok 15</option>
<option>Kelompok 16</option>
<option>Kelompok 17</option>
<option>Kelompok 18</option>
<option>Kelompok 19</option>
<option>Kelompok 20</option>
<option>Kelompok 21</option>
<option>Kelompok 22</option>
<option>Kelompok 23</option>
<option>Kelompok 24</option>
<option>Kelompok 25</option>
<option>Kelompok 26</option>
<option>Kelompok 27</option>
<option>Kelompok 28</option>
<option>Kelompok 29</option>
<option>Kelompok 30</option>
<option>Kelompok 31</option>
<option>Kelompok 32</option>
<option>Kelompok 33</option>
<option>Kelompok 34</option>
<option>Kelompok 35</option>
<option>Kelompok 36</option>
<option>Kelompok 37</option>
<option>Kelompok 38</option>
<option>Kelompok 39</option>
<option>Kelompok 40</option>
<option>Kelompok 41</option>
<option>Kelompok 42</option>
<option>Kelompok 43</option>
<option>Kelompok 44</option>
</select>

<hr>

<label class="form-label">Gameplay</label>
<div class="d-flex gap-3 align-items-center mb-3">
  <input type="range" min="0" max="100" value="50" id="gameplay" class="form-range">
  <span id="gameplayScore" class="score-box">50</span>
</div>

<label class="form-label">Kreativitas & Orisinalitas</label>
<div class="d-flex gap-3 align-items-center mb-3">
  <input type="range" min="0" max="100" value="50" id="kreativitas" class="form-range">
  <span id="kreativitasScore" class="score-box">50</span>
</div>

<label class="form-label">Desain Visual</label>
<div class="d-flex gap-3 align-items-center mb-3">
  <input type="range" min="0" max="100" value="50" id="desain" class="form-range">
  <span id="desainScore" class="score-box">50</span>
</div>

<label class="form-label">Fitur Game</label>
<div class="d-flex gap-3 align-items-center mb-3">
  <input type="range" min="0" max="100" value="50" id="fitur" class="form-range">
  <span id="fiturScore" class="score-box">50</span>
</div>

<label class="form-label">Catatan Juri</label>
<textarea id="catatan" rows="3" class="form-control mb-3"></textarea>

<button type="submit" class="btn btn-light w-100">
Submit Penilaian
</button>

</form>
</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycby9c3VZLFoiAzoIKPMJnVqazQeyBovh0bdADkwMZO7vqdYLr2JYf4ge7Nv4N7NDrAXcqQ/exec";

// update nilai slider
[
 ["gameplay","gameplayScore"],
 ["kreativitas","kreativitasScore"],
 ["desain","desainScore"],
 ["fitur","fiturScore"]
].forEach(item => {

  const slider = document.getElementById(item[0]);
  const score = document.getElementById(item[1]);

  slider.addEventListener("input", function(){
    score.textContent = slider.value;
  });

});

// submit form
document
.getElementById("form-penilaian")
.addEventListener("submit", function(e){

  e.preventDefault();

  const btn = this.querySelector("button");

  btn.disabled = true;
  btn.textContent = "Mengirim...";

  const formData = new FormData();

  formData.append("tim",
    document.getElementById("tim").value);

  formData.append("gameplay",
    document.getElementById("gameplay").value);

  formData.append("kreativitas",
    document.getElementById("kreativitas").value);

  formData.append("desain",
    document.getElementById("desain").value);

  formData.append("fitur",
    document.getElementById("fitur").value);

  formData.append("catatan",
    document.getElementById("catatan").value);

  fetch(scriptURL,{
    method:"POST",
    body:formData
  })
  .then(response => response.text())
  .then(result => {

    alert("✅ Penilaian berhasil disimpan");

    document
      .getElementById("form-penilaian")
      .reset();

  })
  .catch(error => {

    console.error(error);

    alert("❌ Gagal menyimpan data");

  })
  .finally(() => {

    btn.disabled = false;
    btn.textContent = "Submit Penilaian";

  });

});

</script>

</body>
</html>
